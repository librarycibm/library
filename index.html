// ===== SEND MAIL NOW =====
function sendReturnMail(sr, empName, staffNo, bookTitle, accNo, issueDate, dueDate, email) {
  if(!email) {
    // Ask for email if not set
    const em = prompt('Email address not set for this employee.\nEnter email to send reminder:');
    if(!em) return;
    email = em;
    // Save email to this issue
    const issue = ISS.find(i => String(i.sr) === String(sr));
    if(issue) issue.em = em;
    const s = ST.find(x => x.no === staffNo);
    if(s) s.em = em;
  }
  if(!SHEETS_CONNECTED || !SHEET_URL) {
    alert('Please connect Google Sheets first from Admin tab.');
    return;
  }
  sheetsRequest({
    action: 'sendReturnReminder',
    empName, staffNo, email,
    bookTitle, accNo, issueDate, dueDate
  }).then(r => {
    if(r && r.status === 'ok') {
      alert('✅ Email sent to ' + email);
    } else {
      alert('⛔ Email failed: ' + (r ? r.message : 'Unknown error'));
    }
  });
}

  const acc = document.getElementById('IBK').value;
  const due = document.getElementById('IDD').value;
  const issDate = document.getElementById('IDA').value;

  if(!em) { alert('Please enter email address first.'); return; }
  if(!nm) { alert('Please select an employee first.'); return; }

  const m = document.getElementById('IM');
  m.className = 'mwarn';
  m.innerHTML = '⏳ Sending email to ' + em + '...';

  if(!SHEET_URL) {
    // Show preview if not connected
    m.className = 'mok';
    m.innerHTML = '📧 Email Preview (Connect Google Sheets to send actual emails):<br><b>TO:</b> ' + em + ' | <b>Book:</b> ' + (bkTitle.split('—')[1]||bkTitle).trim() + ' | <b>Due:</b> ' + (due?due.split('-').reverse().join('/'):'TBD');
    return;
  }

  const bookTitleClean = bkTitle.includes('—') ? bkTitle.split('—').slice(1).join('—').trim() : bkTitle;
  sheetsRequest({
    action: 'sendNow',
    empName: nm,
    staffNo: sno,
    email: em,
    bookTitle: bookTitleClean,
    accNo: acc,
    issueDate: issDate,
    dueDate: due
  }).then(r => {
    if(r && r.status === 'ok') {
      m.className = 'mok';
      m.innerHTML = '✅ Issue confirmation email sent to <b>' + em + '</b>';
    } else {
      m.className = 'mer';
      m.innerHTML = '⛔ Email failed: ' + (r ? r.message : 'Unknown error');
    }
  });
}

// ===== SHEETS HELPER FUNCTIONS =====
async function saveToSheets(action, data) {
  if(!SHEET_URL) return null;
  try {
    const params = new URLSearchParams({action, ...data});
    const url = SHEET_URL + '?' + params.toString();
    const resp = await fetch(url, {
      method: 'GET',
      redirect: 'follow',
      mode: 'cors'
    });
    const text = await resp.text();
    try { return JSON.parse(text); } catch(e) { return {status:'ok'}; }
  } catch(e) {
    console.log('Sheets save failed, trying no-cors:', e);
    // Fallback: fire and forget with no-cors
    try {
      const params = new URLSearchParams({action, ...data});
      fetch(SHEET_URL + '?' + params.toString(), {
        method: 'GET',
        mode: 'no-cors',
        redirect: 'follow'
      });
    } catch(e2) {
      console.log('No-cors also failed:', e2);
    }
    return {status:'ok'};
  }
}

async function sheetsRequest(params) {
  if(!SHEET_URL) return null;
  try {
    const url = SHEET_URL + '?' + new URLSearchParams(params).toString();
    const resp = await fetch(url, {redirect: 'follow'});
    const text = await resp.text();
    // Handle both JSON and JSONP responses
    const clean = text.trim().replace(/^[^{]*(\{)/, '$1').replace(/(\})[^}]*$/, '$1');
    try { return JSON.parse(clean); } 
    catch(e) { return JSON.parse(text); }
  } catch(e) {
    console.log('Sheets request failed:', e);
    return null;
  }
}

async function loadFromSheets() {
  if(!SHEET_URL) return false;
  try {
    const result = await sheetsRequest({action:'getIssues'});
    if(result && result.status === 'ok') {
      ISS = result.issues.map(i => ({
        sr:i.sr, id:i.id, sno:String(i.sno), en:i.en, dg:i.dg,
        ba:String(i.ba), bt:i.bt, dd:i.dd, rd:i.rd||'', rm:i.rm||'',
        lib:i.lib, libEmp:String(i.libEmp||''), em:i.em||''
      }));
      if(ISS.length > 0) NSR = Math.max(...ISS.map(i=>parseInt(i.sr)||0)) + 1;
      SHEETS_CONNECTED = true;
      BOOKS.forEach(b => {
        const activeIssue = ISS.find(i => String(i.ba) === String(b.acc) && !i.rd);
        if(activeIssue) b.av = false;
      });
      return true;
    }
  } catch(e) {
    console.log('Load from sheets failed:', e);
  }
  return false;
}

function issB(){
  const date=document.getElementById('IDA').value;
  const manDiv=document.getElementById('DIV-MAN');
  const isManual = manDiv && manDiv.style.display!=='none';
  const sno = isManual ? (document.getElementById('MAN-SNO').value.trim()) : document.getElementById('IST').value;
  const nm = document.getElementById('INM').value;
  const bkManDiv = document.getElementById('BK-DIV-MAN');
  const isBkManual = bkManDiv && bkManDiv.style.display!=='none';
  const acc = isBkManual ? (document.getElementById('MAN-ACC').value.trim()) : document.getElementById('IBK').value;
  const manTitle = isBkManual ? document.getElementById('MAN-TITLE').value.trim() : '';
  const manAuthor = isBkManual ? (document.getElementById('MAN-AUTHOR') ? document.getElementById('MAN-AUTHOR').value.trim() : '') : '';
  const em=document.getElementById('IEM').value;
  const rm = isBkManual ? (document.getElementById('IRM2') ? document.getElementById('IRM2').value.trim() : '') : document.getElementById('IRM').value;
  const m=document.getElementById('IM');
  if(!date||!sno||!acc){m.className='mer';m.innerHTML='⛔ Issue Date, Employee, and Book are all required.';return;}
  if(isBkManual && !manTitle){m.className='mer';m.innerHTML='⛔ Please enter Book Title.';return;}
  const c=ISS.filter(i=>i.sno===sno&&!i.rd).length;
  if(c>=3){m.className='mer';m.innerHTML='⛔ Maximum 3 books limit reached. Employee must return a book first.';return;}
  let bk = BM[acc];
  if(isBkManual) {
    if(bk && !bk.av){m.className='mer';m.innerHTML='⛔ This book is currently issued to someone else.';return;}
    if(!bk) {
      // Add new book to catalogue
      const newBook = {sr: BOOKS.length+1, acc: acc, title: manTitle, author: manAuthor, av: false};
      BOOKS.push(newBook);
      BM[acc] = newBook;
      bk = newBook;
      // Save to sheets catalogue
      if(SHEETS_CONNECTED && SHEET_URL) {
        sheetsRequest({action:'addBook', accNo:acc, title:manTitle, author:manAuthor});
      }
    } else {
      bk.av = false;
    }
  } else {
    if(!bk||!bk.av){m.className='mer';m.innerHTML='⛔ This book is not available for issue.';return;}
  }
  const due=ad(date,90),s=ST.find(x=>x.no===sno);
  showModal(
    '📤 Confirm Book Issue',
    `<b>Please confirm you are issuing this book:</b><br><br>
     📖 <b>Book:</b> ${bk.title}<br>
     🔖 <b>Accession No:</b> ${acc}<br>
     👤 <b>Employee:</b> ${nm} (${sno})<br>
     💼 <b>Designation:</b> ${s?s.dg:''}<br>
     📅 <b>Issue Date:</b> ${fd(date)}<br>
     📅 <b>Due Date:</b> ${fd(due)}<br><br>
     ⚠️ <i>Ensure employee has signed the physical register before confirming.</i>`,
    'Confirm & Issue','bp',
    ()=>{
      if(s&&em)s.em=em;
      const newEntry = {sr:NSR,id:date,sno,en:nm,dg:s?s.dg:'',ba:acc,bt:bk.title,dd:due,rd:'',rm,lib:CU.name,libEmp:CU.empNo,em};
      ISS.push(newEntry);
      NSR++;
      bk.av=false;
      
      // Save to Google Sheets if connected
      if(SHEETS_CONNECTED && SHEET_URL) {
        saveToSheets('issueBook', {
          issueDate:date, staffNo:sno, empName:nm, designation:s?s.dg:'',
          bookTitle:bk.title, accNo:acc, dueDate:due, libName:CU.name,

function doRet(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  const days=ov(i)?Math.floor((new Date()-new Date(i.dd))/864e5):0;
  
  // Email section - Yes/No if email exists, input field if not
  const emailField = i.em
    ? `<div style="margin-top:10px;background:#f0f9ff;border-radius:6px;padding:10px;font-size:12px">
        📧 <b>Send return confirmation email?</b><br>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <input type="radio" name="sendmail" id="SM-YES" value="yes" checked>
          <label for="SM-YES" style="cursor:pointer">Yes — send to <b>${i.em}</b></label>
        </div>
        <div style="margin-top:5px;display:flex;gap:8px;align-items:center">
          <input type="radio" name="sendmail" id="SM-NO" value="no">
          <label for="SM-NO" style="cursor:pointer">No — skip email</label>
        </div>
       </div>`
    : `<div style="margin-top:10px;background:#f0f9ff;border-radius:6px;padding:10px;font-size:12px">
        📧 <b>Send return confirmation email? (optional)</b><br>
        <input type="email" id="RET-EM2" placeholder="Enter email address (leave blank to skip)"
          style="padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;width:100%;margin-top:6px">
       </div>`;

  showModal(
    '📥 Confirm Book Return',
    `<b>You are about to mark this book as RETURNED:</b><br><br>
     📖 <b>Book:</b> ${i.bt}<br>
     🔖 <b>Accession No:</b> ${i.ba}<br>
     👤 <b>Employee:</b> ${i.en} (${i.sno})<br>
     📅 <b>Issue Date:</b> ${fd(i.id)}<br>
     📅 <b>Due Date:</b> ${fd(i.dd)}<br>
     📅 <b>Return Date (Today):</b> <b>${fd(td())}</b>
     ${ov(i)?`<br><br><span style="color:#A32D2D;font-weight:700">⚠️ WARNING: This book is OVERDUE by ${days} days!</span>`:''}
     ${emailField}`,
    'Confirm Return','bg',
    ()=>{
      // Check email decision
      const smYes = document.getElementById('SM-YES');
      const retEm2 = document.getElementById('RET-EM2');
      let emailToUse = i.em;
      let sendEmail = false;

      if(smYes) {
        // Radio buttons - email was already set
        sendEmail = smYes.checked;
      } else if(retEm2) {
        // Input field - email was not set
        emailToUse = retEm2.value.trim();
        sendEmail = !!emailToUse;
        if(emailToUse) {
          i.em = emailToUse;
          const s=ST.find(x=>x.no===i.sno);if(s)s.em=emailToUse;
        }
      }

      // Process return
      i.rd=td();
      const bk=BM[i.ba];if(bk)bk.av=true;
      if(SHEETS_CONNECTED && SHEET_URL){
        // Pass sendEmail flag - Apps Script will send confirmation only if true
        saveToSheets('returnBook',{srNo:i.sr,returnDate:i.rd,email:emailToUse||'',sendEmail:sendEmail?'yes':'no'});
      }
      go('ret');
    }
  );
}

function dlCSV(){
  const hdr=['Sr No','Issue Date','Staff No','Employee Name','Designation','Book Title','Acc No','Due Date','Return Date','Status','Issued By','Remarks'];
  const rows=ISS.map(i=>[i.sr,fd(i.id),i.sno,'"'+i.en+'"',i.dg,'"'+i.bt+'"',i.ba,fd(i.dd),i.rd?fd(i.rd):'',i.rd?'Returned':ov(i)?'Overdue':'Active','"'+i.lib+'"','"'+(i.rm||'')+'"']);
  const csv=[hdr,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='CIBM_Library_Register_'+td().replace(/-/g,'')+'.csv';
  a.click();
}

function revRet(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  showModal('🔄 Reverse Return',
    `Are you sure you want to <b>REVERSE the return</b> of this book?<br><br>
     📖 <b>${i.bt}</b><br>👤 ${i.en} (${i.sno})<br>
     Return Date: ${fd(i.rd)}<br><br>
     The book will be marked as <b>Active / Issued</b> again.`,
    'Reverse Return','bo',
    ()=>{
      i.rd='';const bk=BM[i.ba];if(bk)bk.av=false;
      if(SHEETS_CONNECTED && SHEET_URL) saveToSheets('reverseReturn',{srNo:i.sr});
      go('adm');
    }
  );
}
function admDel(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  showModal('🗑️ Delete Record',
    `Are you sure you want to <b>permanently DELETE</b> this record?<br><br>
     📖 <b>${i.bt}</b><br>👤 ${i.en} (${i.sno})<br><br>
     <span style="color:#A32D2D"><b>This action cannot be undone.</b></span>`,
    'Delete Permanently','br',
    ()=>{
      const idx=ISS.indexOf(i);
      if(idx>-1){const bk=BM[i.ba];if(bk&&!i.rd)bk.av=true;ISS.splice(idx,1);}
      if(SHEETS_CONNECTED && SHEET_URL) saveToSheets('deleteEntry',{srNo:i.sr});
      go('adm');
    }
  );
}

// ===== BOOK CATALOGUE FUNCTIONS =====
// Track manually added books
const NEW_BOOKS = [];

function getNewBooksHtml() {
  if(!NEW_BOOKS.length) return '<p style="color:#888;font-size:12px">No new books added yet in this session.</p>';
  return `<div class="tw"><table><thead><tr><th>Acc No</th><th>Book Title</th><th>Author</th><th>Subject</th><th>Added</th></tr></thead><tbody>
    ${NEW_BOOKS.map(b=>`<tr><td>${b.acc}</td><td>${b.title}</td><td>${b.author||'—'}</td><td>${b.subject||'—'}</td><td style="color:#0F6E56">✅ Added</td></tr>`).join('')}
  </tbody></table></div>`;
}

function addBookCatalogue() {
  const acc = document.getElementById('BC-ACC').value.trim();
  const title = document.getElementById('BC-TITLE').value.trim();
  const author = document.getElementById('BC-AUTH').value.trim();
  const subject = document.getElementById('BC-SUBJ').value.trim();
  const msg = document.getElementById('BC-MSG');

  if(!acc || !title) { msg.className='mer'; msg.innerHTML='⛔ Accession No and Book Title are required.'; return; }
  if(BM[acc]) { msg.className='mer'; msg.innerHTML='⛔ Accession No <b>' + acc + '</b> already exists in catalogue.'; return; }

  // Add to local BOOKS array
  const newBook = {sr: BOOKS.length+1, acc, title, author, subject, av: true};
  BOOKS.push(newBook);
  BM[acc] = newBook;
  NEW_BOOKS.push(newBook);

  // Save to Google Sheets
  if(SHEETS_CONNECTED && SHEET_URL) {
    sheetsRequest({action:'addBook', accNo:acc, title, author, subject}).then(r => {
      if(r && r.status==='ok') {
        msg.className='mok';
        msg.innerHTML='✅ Book "<b>' + title + '</b>" (Acc: ' + acc + ') added to catalogue and saved to Google Sheets.';
      } else {
        msg.className='mwarn';
        msg.innerHTML='⚠️ Book added locally but Sheets save failed. Reconnect and try again.';
      }
    });
  } else {
    msg.className='mok';
    msg.innerHTML='✅ Book "<b>' + title + '</b>" added to catalogue. Connect Google Sheets to save permanently.';
  }

  // Clear fields
  ['BC-ACC','BC-TITLE','BC-AUTH','BC-SUBJ'].forEach(id => { document.getElementById(id).value=''; });
  
  // Refresh new books list
  const nbl = document.getElementById('NEW-BOOKS-LIST');
  if(nbl) nbl.innerHTML = getNewBooksHtml();
}

function downloadBookCatalogue() {
  const headers = ['Sr No','Accession No','Book Title','Author','Subject','Status'];
  const rows = BOOKS.map(b => [
    b.sr, b.acc, '"'+b.title+'"', '"'+(b.author||'')+'"', '"'+(b.subject||'')+'"',
    b.av ? 'Available' : 'Issued'
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CIBM_Book_Catalogue_' + new Date().toISOString().split('T')[0].replace(/-/g,'') + '.csv';
  a.click();
}

function chgPwd(empNo, pwId, pw2Id, msgId){
  const pw=document.getElementById(pwId).value;
  const pw2=document.getElementById(pw2Id).value;
  const msg=document.getElementById(msgId);
  if(!pw||pw.length<6){msg.className='mer';msg.innerHTML='⛔ Password must be at least 6 characters.';msg.style.marginBottom='8px';return;}
  if(pw!==pw2){msg.className='mer';msg.innerHTML='⛔ Passwords do not match.';msg.style.marginBottom='8px';return;}
  USERS[empNo].pass=pw;
  msg.className='mok';msg.innerHTML='✅ Password updated successfully for this session.';msg.style.marginBottom='8px';
  document.getElementById(pwId).value='';document.getElementById(pw2Id).value='';
}

function connectSheets() {
  const url = document.getElementById('SHEET-URL-INPUT').value.trim();
  if(!url || !url.includes('script.google.com')) {
    document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Please enter a valid Google Apps Script URL.</div>';
    return;
  }
  SHEET_URL = url;
  document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mwarn">⏳ Connecting and loading data...</div>';
  loadFromSheets().then(connected => {
    if(connected) {
      SHEETS_CONNECTED = true;
      document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mok">✅ Connected! Loaded ' + ISS.length + ' records from Google Sheets. All future transactions will be saved automatically.</div>';
    } else {
      document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Connection failed. Check the URL and try again. Make sure you deployed the script as "Anyone" can access.</div>';
    }
  });
}

function testSheets() {
  const url = document.getElementById('SHEET-URL-INPUT').value.trim() || SHEET_URL;
  if(!url) { alert('Please enter the Apps Script URL first.'); return; }
  document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mwarn">⏳ Testing connection...</div>';
  fetch(url + '?action=test', {method:'GET', redirect:'follow', mode:'cors'})
    .then(r => r.text())
    .then(t => {
      try {
        const d = JSON.parse(t);
        if(d.status === 'ok') {
          document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mok">✅ ' + d.message + '</div>';
        } else {
          document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Error: ' + d.message + '</div>';
        }
      } catch(e) {
        document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Could not parse response. URL may be wrong.</div>';
      }
    })
    .catch(e => {
      document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Connection failed: ' + e.message + '<br><small>Make sure Apps Script is deployed as "Anyone" can access.</small></div>';
    });
}

function syncOverdue() {
  const url = SHEET_URL || document.getElementById('SHEET-URL-INPUT').value.trim();
  if(!url) { alert('Connect to Google Sheets first.'); return; }
  document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mwarn">⏳ Checking overdue books and sending emails...</div>';
  fetch(url + '?action=checkOverdue')
    .then(r => r.json())
    .then(d => {
      document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mok">✅ ' + d.message + '</div>';
    })
    .catch(e => {
      document.getElementById('SHEETS-STATUS').innerHTML = '<div class="mer">⛔ Failed: ' + e.toString() + '</div>';
    });
}

function saveEdit(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  const wasRet=!!i.rd,nowRet=!!document.getElementById('ED-RD').value;
  i.id=document.getElementById('ED-ID').value;
  i.dd=document.getElementById('ED-DD').value;
  i.rd=document.getElementById('ED-RD').value;
  i.rm=document.getElementById('ED-RM').value;
  const bk=BM[i.ba];
  if(bk){if(nowRet&&!wasRet)bk.av=true;else if(!nowRet&&wasRet)bk.av=false;}
  if(SHEETS_CONNECTED && SHEET_URL) {
    saveToSheets('editEntry',{srNo:sr, issueDate:i.id, dueDate:i.dd, returnDate:i.rd, remarks:i.rm});
  }
  showModal('✅ Saved','Record has been updated successfully.','OK','bg',()=>go('adm'));
}
