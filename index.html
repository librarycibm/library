<script>
const USERS={
  '898736':{pass:'lib@cibm',role:'librarian',name:'SHASHI KANT PANDEY',empNo:'898736'},
  '864559':{pass:'Senator@4219',role:'admin',name:'NITIN SETIA',empNo:'864559'}
};

let SHEET_URL='https://script.google.com/macros/s/AKfycbx-GjV-fgwnj4Xm1wi2jUEbaoC6iVtZ5gIlYsVy-AWBGXDXZfSqSXULv7f9UejIdF3lIA/exec';
let SHEETS_CONNECTED=false;
let CU=null,ISS=[],NSR=1;
let _modCb=null;
const NEW_BOOKS=[];

const td=()=>new Date().toISOString().split('T')[0];
const ad=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0]};
const fd=d=>{if(!d)return'\u2014';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]};
const ov=i=>!i.rd&&i.dd<td();
const isAdmin=()=>CU&&CU.role==='admin';

function showModal(title,body,btnLabel,btnClass,cb){
  document.getElementById('MOD-T').textContent=title;
  document.getElementById('MOD-B').innerHTML=body;
  const ok=document.getElementById('MOD-OK');
  ok.textContent=btnLabel||'Confirm';ok.className=btnClass||'bp';
  _modCb=cb;
  document.getElementById('MOD').classList.remove('hidden');
}
function modClose(){document.getElementById('MOD').classList.add('hidden');_modCb=null;}
function modConfirm(){document.getElementById('MOD').classList.add('hidden');if(_modCb)_modCb();_modCb=null;}

function togglePwd(inputId,btnId){
  const inp=document.getElementById(inputId);
  const btn=document.getElementById(btnId);
  if(inp.type==='password'){inp.type='text';btn.innerHTML='&#128584;';}
  else{inp.type='password';btn.innerHTML='&#128065;';}
}

async function saveToSheets(action,data){
  if(!SHEET_URL)return null;
  try{
    const params=new URLSearchParams({action,...data});
    const url=SHEET_URL+'?'+params.toString();
    const resp=await fetch(url,{method:'GET',redirect:'follow',mode:'cors'});
    const text=await resp.text();
    try{return JSON.parse(text);}catch(e){return{status:'ok'};}
  }catch(e){
    try{
      const params=new URLSearchParams({action,...data});
      fetch(SHEET_URL+'?'+params.toString(),{method:'GET',mode:'no-cors',redirect:'follow'});
    }catch(e2){}
    return{status:'ok'};
  }
}

async function sheetsRequest(params){
  if(!SHEET_URL)return null;
  try{
    const url=SHEET_URL+'?'+new URLSearchParams(params).toString();
    const resp=await fetch(url,{redirect:'follow'});
    const text=await resp.text();
    const clean=text.trim().replace(/^[^{]*(\{)/,'$1').replace(/(\})[^}]*$/,'$1');
    try{return JSON.parse(clean);}
    catch(e){return JSON.parse(text);}
  }catch(e){console.log('Sheets request failed:',e);return null;}
}

async function loadFromSheets(){
  if(!SHEET_URL)return false;
  try{
    const result=await sheetsRequest({action:'getIssues'});
    if(result&&result.status==='ok'){
      ISS=result.issues.map(i=>({
        sr:i.sr,id:i.id,sno:String(i.sno),en:i.en,dg:i.dg,
        ba:String(i.ba),bt:i.bt,dd:i.dd,rd:i.rd||'',rm:i.rm||'',
        lib:i.lib,libEmp:String(i.libEmp||''),em:i.em||''
      }));
      if(ISS.length>0)NSR=Math.max(...ISS.map(i=>parseInt(i.sr)||0))+1;
      SHEETS_CONNECTED=true;
      BOOKS.forEach(b=>{
        const activeIssue=ISS.find(i=>String(i.ba)===String(b.acc)&&!i.rd);
        if(activeIssue)b.av=false;
      });
      return true;
    }
  }catch(e){console.log('Load from sheets failed:',e);}
  return false;
}

function sendReturnMail(sr,empName,staffNo,bookTitle,accNo,issueDate,dueDate,email){
  if(!SHEETS_CONNECTED||!SHEET_URL){alert('Please connect Google Sheets first from Admin tab.');return;}
  if(!email){
    const em=prompt('No email found for this employee.\nEnter email address to send reminder:');
    if(!em)return;
    email=em;
    const issue=ISS.find(i=>String(i.sr)===String(sr));
    if(issue)issue.em=em;
    const s=ST.find(x=>x.no===staffNo);
    if(s)s.em=em;
  }
  sheetsRequest({action:'sendReturnReminder',empName,staffNo,email,bookTitle,accNo,issueDate,dueDate}).then(r=>{
    if(r&&r.status==='ok'){alert('\u2705 Reminder email sent to '+email);}
    else{alert('\u26d4 Email failed: '+(r?r.message:'Connection error'));}
  });
}

function doLogin(){
  const u=document.getElementById('LU').value.trim(),p=document.getElementById('LP').value;
  const usr=USERS[u];
  if(!usr||usr.pass!==p){const le=document.getElementById('LE');le.classList.remove('hidden');le.textContent='Invalid employee number or password.';return;}
  CU=usr;
  document.getElementById('LS').classList.add('hidden');
  document.getElementById('AP').classList.remove('hidden');
  const chip=CU.role==='admin'?'<span class="admin-chip">ADMIN</span>':'<span class="lib-chip">LIBRARIAN</span>';
  document.getElementById('WH').innerHTML=CU.name+' &nbsp;|&nbsp; Emp No: '+CU.empNo+chip;
  if(isAdmin())document.getElementById('ADM-TAB').classList.remove('hidden');
  if(SHEET_URL){
    document.getElementById('MC').innerHTML='<div style="text-align:center;padding:40px;color:#1a3a6b"><div style="font-size:30px">&#9203;</div><div style="margin-top:10px;font-weight:600;font-size:14px">Connecting to Google Sheets...</div><div style="font-size:12px;color:#888;margin-top:4px">Loading your library data...</div></div>';
    loadFromSheets().then(connected=>{
      SHEETS_CONNECTED=connected;
      go('dash');
    });
  }else{go('dash');}
}

function doLogout(){
  CU=null;
  document.getElementById('AP').classList.add('hidden');
  document.getElementById('LS').classList.remove('hidden');
  document.getElementById('LU').value='';
  document.getElementById('LP').value='';
  document.getElementById('LE').classList.add('hidden');
}

function go(t){
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('act',['dash','iss','ret','bks','mbr','reg','adm'][i]===t));
  const mc=document.getElementById('MC');
  if(t==='dash')mc.innerHTML=rdash();
  else if(t==='iss'){mc.innerHTML=riss();setTimeout(()=>{const d=document.getElementById('IDA');if(d){d.value=td();document.getElementById('IDD').value=ad(td(),90);}},30);}
  else if(t==='ret')mc.innerHTML=rret();
  else if(t==='bks')mc.innerHTML=rbks();
  else if(t==='mbr')mc.innerHTML=rmbr();
  else if(t==='reg')mc.innerHTML=rreg();
  else if(t==='adm'){if(!isAdmin())return;mc.innerHTML=radm();}
}

function rdash(){
  const act=ISS.filter(i=>!i.rd).length,ovr=ISS.filter(i=>ov(i)).length,avl=BOOKS.filter(b=>b.av).length;
  return`

    <div style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 10px;text-align:center;border-top:4px solid ${c}">
      <div style="font-size:22px;margin-bottom:4px">${ic}</div>
      <div style="font-size:24px;font-weight:700;color:${c}">${v}</div>
      <div style="font-size:11px;color:#777;margin-top:3px">${l}</div>
    </div>`).join('')}
  </div>
  ${ovr>0?`<div class="card" style="border-left:4px solid #A32D2D"><div class="section-title" style="color:#A32D2D">&#9888;&#65039; Overdue Books (${ovr})</div><div class="tw"><table><thead><tr><th>Sr No</th><th>Staff No</th><th>Employee Name</th><th>Book Title</th><th>Acc No</th><th>Issue Date</th><th>Due Date</th><th>Days Overdue</th></tr></thead><tbody>${ISS.filter(i=>ov(i)).map(i=>{const dy=Math.floor((new Date()-new Date(i.dd))/864e5);return`<tr style="background:#fff5f5"><td>${i.sr}</td><td>${i.sno}</td><td>${i.en}</td><td>${i.bt}</td><td>${i.ba}</td><td>${fd(i.id)}</td><td>${fd(i.dd)}</td><td style="color:#A32D2D;font-weight:700">${dy} days</td></tr>`}).join('')}</tbody></table></div></div>`:''}
  <div class="card"><div class="section-title">&#128203; Recent Transactions</div>
  ${ISS.length===0?'<p style="color:#888;font-size:13px;text-align:center;padding:20px">No transactions yet.</p>':`<div class="tw"><table><thead><tr><th>Sr No</th><th>Issue Date</th><th>Staff No</th><th>Employee Name</th><th>Book Title</th><th>Acc No</th><th>Due Date</th><th>Return Date</th><th>Status</th></tr></thead><tbody>${[...ISS].reverse().slice(0,10).map(i=>`<tr><td>${i.sr}</td><td>${fd(i.id)}</td><td>${i.sno}</td><td>${i.en}</td><td>${i.bt}</td><td>${i.ba}</td><td>${fd(i.dd)}</td><td style="font-weight:${i.rd?700:400};color:${i.rd?'#0F6E56':'#aaa'}">${i.rd?fd(i.rd):'&#8212;'}</td><td><span class="bdg ${i.rd?'bdn':ov(i)?'blt':'bok'}">${i.rd?'Returned':ov(i)?'Overdue':'Active'}</span></td></tr>`).join('')}</tbody></table></div>`}
  </div>`;
}

function upd(){const d=document.getElementById('IDA');if(d&&d.value)document.getElementById('IDD').value=ad(d.value,90);}

function setMode(mode){
  if(mode==='list'){
    document.getElementById('DIV-LIST').style.display='';

    document.getElementById('MODE-LIST').className='bp';
    document.getElementById('MODE-MAN').style.cssText='font-size:11px;padding:4px 10px;border:1px solid #ccc;background:#fff;color:#222;border-radius:6px;cursor:pointer';
    const dgRow=document.getElementById('DG-ROW');if(dgRow)dgRow.style.display='';
    document.getElementById('IST').value='';document.getElementById('INM').value='';document.getElementById('IDG').value='';
  }else{
    document.getElementById('DIV-LIST').style.display='none';
    document.getElementById('DIV-MAN').style.display='';

    document.getElementById('MODE-LIST').style.cssText='font-size:11px;padding:4px 10px;border:1px solid #ccc;background:#fff;color:#222;border-radius:6px;cursor:pointer';

function issB(){
  const date=document.getElementById('IDA').value;
  const manDiv=document.getElementById('DIV-MAN');
  const isManual=manDiv&&manDiv.style.display!=='none';
  const sno=isManual?(document.getElementById('MAN-SNO').value.trim()):document.getElementById('IST').value;
  const nm=document.getElementById('INM').value;
  const acc=document.getElementById('IBK').value;
  const em=document.getElementById('IEM').value;
  const rm=document.getElementById('IRM').value;
  const m=document.getElementById('IM');
  if(!date||!sno||!acc){m.className='mer';m.innerHTML='&#9940; Issue Date, Employee, and Book are all required.';return;}
  if(!em||!em.includes('@')){m.className='mer';m.innerHTML='&#9940; Valid email address is required to issue a book.';return;}
  const c=ISS.filter(i=>i.sno===sno&&!i.rd).length;
  if(c>=3){m.className='mer';m.innerHTML='&#9940; Maximum 3 books limit reached. Employee must return a book first.';return;}
  const bk=BM[acc];
  if(!bk||!bk.av){m.className='mer';m.innerHTML='&#9940; This book is not available for issue.';return;}
  const due=ad(date,90),s=ST.find(x=>x.no===sno);
  showModal(
    '&#128228; Confirm Book Issue',
    `<b>Please confirm you are issuing this book:</b><br><br>
     &#128214; <b>Book:</b> ${bk.title}<br>
     &#128278; <b>Accession No:</b> ${acc}<br>
     &#128100; <b>Employee:</b> ${nm} (${sno})<br>
     &#128188; <b>Designation:</b> ${s?s.dg:''}<br>
     &#128197; <b>Issue Date:</b> ${fd(date)}<br>
     &#128197; <b>Due Date:</b> ${fd(due)}<br><br>
     &#9888;&#65039; <i>Ensure employee has signed the physical register before confirming.</i>`,
    'Confirm & Issue','bp',
    ()=>{
      if(s&&em)s.em=em;
      const newEntry={sr:NSR,id:date,sno,en:nm,dg:s?s.dg:'',ba:acc,bt:bk.title,dd:due,rd:'',rm,lib:CU.name,libEmp:CU.empNo,em};
      ISS.push(newEntry);NSR++;bk.av=false;
      if(SHEETS_CONNECTED&&SHEET_URL){
        saveToSheets('issueBook',{issueDate:date,staffNo:sno,empName:nm,designation:s?s.dg:'',bookTitle:bk.title,accNo:acc,dueDate:due,libName:CU.name,libEmp:CU.empNo,email:em,remarks:rm}).then(r=>{if(r&&r.srNo)newEntry.sr=r.srNo;});
      }
      if(em&&SHEETS_CONNECTED&&SHEET_URL){
        sheetsRequest({action:'sendNow',empName:nm,staffNo:sno,email:em,bookTitle:bk.title,accNo:acc,issueDate:date,dueDate:due});
      }
      m.className='mok';
      m.innerHTML=`&#9989; <b>SUCCESS:</b> "${bk.title}" (Acc: ${acc}) issued to <b>${nm}</b>. Due Date: <b>${fd(due)}</b>. &#128231; Confirmation email sent to ${em}.`;
      ['IST','INM','IDG','IEM','IBS','IAC','IRM'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      document.getElementById('IBK').innerHTML='<option value="">-- Search first --</option>';
    }
  );
}

function doRet(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  const days=ov(i)?Math.floor((new Date()-new Date(i.dd))/864e5):0;
  const emailField=i.em
    ?`<div style="margin-top:10px;background:#f0f9ff;border-radius:6px;padding:10px;font-size:12px">
        &#128231; <b>Send return confirmation email?</b><br>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center"><input type="radio" name="sendmail" id="SM-YES" value="yes" checked><label for="SM-YES" style="cursor:pointer">Yes &#8212; send to <b>${i.em}</b></label></div>
        <div style="margin-top:5px;display:flex;gap:8px;align-items:center"><input type="radio" name="sendmail" id="SM-NO" value="no"><label for="SM-NO" style="cursor:pointer">No &#8212; skip email</label></div>
       </div>`
    :`<div style="margin-top:10px;background:#f0f9ff;border-radius:6px;padding:10px;font-size:12px">
        &#128231; <b>Send return confirmation email? (optional)</b><br>
        <input type="email" id="RET-EM2" placeholder="Enter email address (leave blank to skip)" style="padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;width:100%;margin-top:6px">
       </div>`;
  showModal(
    '&#128229; Confirm Book Return',
    `<b>You are about to mark this book as RETURNED:</b><br><br>
     &#128214; <b>Book:</b> ${i.bt}<br>
     &#128278; <b>Accession No:</b> ${i.ba}<br>
     &#128100; <b>Employee:</b> ${i.en} (${i.sno})<br>
     &#128197; <b>Issue Date:</b> ${fd(i.id)}<br>
     &#128197; <b>Due Date:</b> ${fd(i.dd)}<br>
     &#128197; <b>Return Date (Today):</b> <b>${fd(td())}</b>
     ${ov(i)?`<br><br><span style="color:#A32D2D;font-weight:700">&#9888;&#65039; WARNING: This book is OVERDUE by ${days} days!</span>`:''}
     ${emailField}`,
    'Confirm Return','bg',
    ()=>{
      const smYes=document.getElementById('SM-YES');
      const retEm2=document.getElementById('RET-EM2');
      let emailToUse=i.em,sendEmail=false;
      if(smYes){sendEmail=smYes.checked;}
      else if(retEm2){emailToUse=retEm2.value.trim();sendEmail=!!emailToUse;if(emailToUse){i.em=emailToUse;const s=ST.find(x=>x.no===i.sno);if(s)s.em=emailToUse;}}
      i.rd=td();const bk=BM[i.ba];if(bk)bk.av=true;
      if(SHEETS_CONNECTED&&SHEET_URL){saveToSheets('returnBook',{srNo:i.sr,returnDate:i.rd,email:emailToUse||'',sendEmail:sendEmail?'yes':'no'});}
      go('ret');
    }
  );
}

function frg(){
  const q=(document.getElementById('RGQ').value||'').toLowerCase(),f=document.getElementById('RGF').value;
  let is=[...ISS].reverse();
  if(q)is=is.filter(i=>i.en.toLowerCase().includes(q)||i.sno.includes(q)||i.bt.toLowerCase().includes(q));
  if(f==='act')is=is.filter(i=>!i.rd&&!ov(i));
  else if(f==='ov')is=is.filter(i=>ov(i));
  else if(f==='ret')is=is.filter(i=>!!i.rd);
  document.getElementById('RGT').innerHTML=rrgtb(is);
}

function dlCSV(){
  const hdr=['Sr No','Issue Date','Staff No','Employee Name','Designation','Book Title','Acc No','Due Date','Return Date','Status','Issued By','Remarks'];
  const rows=ISS.map(i=>[i.sr,fd(i.id),i.sno,'"'+i.en+'"',i.dg,'"'+i.bt+'"',i.ba,fd(i.dd),i.rd?fd(i.rd):'',i.rd?'Returned':ov(i)?'Overdue':'Active','"'+i.lib+'"','"'+(i.rm||'')+'"']);
  const csv=[hdr,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='CIBM_Library_Register_'+td().replace(/-/g,'')+'.csv';a.click();
}

function rrevtb(iss){
  if(!iss.length)return'<p style="color:#888;font-size:13px;padding:10px">No returned records found.</p>';
  return`<div class="tw"><table><thead><tr><th>Sr No</th><th>Staff No</th><th>Employee</th><th>Book Title</th><th>Acc No</th><th>Issue Date</th><th>Return Date</th><th>Action</th></tr></thead><tbody>
  ${iss.slice(0,30).map(i=>`<tr><td>${i.sr}</td><td>${i.sno}</td><td>${i.en}</td><td>${i.bt}</td><td>${i.ba}</td><td>${fd(i.id)}</td><td>${fd(i.rd)}</td>
  <td><button class="bo" style="font-size:11px;padding:3px 8px" onclick="revRet(${i.sr})">&#8617; Reverse</button></td></tr>`).join('')}
  </tbody></table></div>`;
}

function frev(){
  const q=(document.getElementById('RVQ').value||'').toLowerCase();
  const iss=ISS.filter(i=>!!i.rd&&(i.en.toLowerCase().includes(q)||i.sno.includes(q)||i.bt.toLowerCase().includes(q)));
  document.getElementById('RVTB').innerHTML=rrevtb(iss);
}

function revRet(sr){
  const i=ISS.find(x=>x.sr===sr);if(!i)return;
  showModal('&#8617; Reverse Return','Are you sure you want to reverse the return of <b>'+i.bt+'</b> ('+i.ba+') for <b>'+i.en+'</b>? The book will be marked as active again.','Reverse','bo',()=>{
    i.rd='';const bk=BM[i.ba];if(bk)bk.av=false;
    if(SHEETS_CONNECTED&&SHEET_URL)saveToSheets('reverseReturn',{srNo:i.sr});
    go('adm');
  });
}

function rbdl(){
  if(!ISS.length)return'<p style="color:#888;font-size:12px">No records to delete.</p>';
  return`<div class="tw"><table><thead><tr><th style="width:32px"><input type="checkbox" id="CHK-ALL" onchange="chkAll(this)"></th><th>Sr No</th><th>Staff No</th><th>Employee</th><th>Book</th><th>Issue Date</th><th>Status</th></tr></thead><tbody>
  ${ISS.map(i=>`<tr><td><input type="checkbox" class="del-chk" data-sr="${i.sr}"></td><td>${i.sr}</td><td>${i.sno}</td><td>${i.en}</td><td>${i.bt}</td><td>${fd(i.id)}</td><td><span class="bdg ${i.rd?'bdn':ov(i)?'blt':'bok'}">${i.rd?'Returned':ov(i)?'Overdue':'Active'}</span></td></tr>`).join('')}
  </tbody></table></div>`;
}

function chkAll(cb){document.querySelectorAll('.del-chk').forEach(c=>c.checked=cb.checked);}
function selAll(){const cb=document.getElementById('CHK-ALL');if(cb)cb.checked=true;document.querySelectorAll('.del-chk').forEach(c=>c.checked=true);}
function selNone(){const cb=document.getElementById('CHK-ALL');if(cb)cb.checked=false;document.querySelectorAll('.del-chk').forEach(c=>c.checked=false);}

function bulkDel(){
  const srs=Array.from(document.querySelectorAll('.del-chk:checked')).map(c=>parseInt(c.dataset.sr));
  if(!srs.length){alert('No records selected.');return;}
  showModal('&#128465; Confirm Bulk Delete','You are about to permanently delete <b>'+srs.length+'</b> issue record(s). This cannot be undone. Are you sure?','Delete All','br',()=>{
    srs.forEach(sr=>{
      const idx=ISS.findIndex(i=>i.sr===sr);
      if(idx>-1){const bk=BM[ISS[idx].ba];if(bk&&!ISS[idx].rd)bk.av=true;ISS.splice(idx,1);}
    });
    if(SHEETS_CONNECTED&&SHEET_URL)saveToSheets('bulkDelete',{srNos:srs.join(',')});
    go('adm');
  });
}

function chpwd(role){
  const p1=document.getElementById(role==='lib'?'LP1':'AP1').value;
  const p2=document.getElementById(role==='lib'?'LP2':'AP2').value;
  if(!p1){alert('Please enter a new password.');return;}
  if(p1!==p2){alert('Passwords do not match. Please re-enter.');return;}
  if(p1.length<6){alert('Password must be at least 6 characters.');return;}
  const empNo=role==='lib'?'898736':'864559';
  USERS[empNo].pass=p1;
  alert('Password updated for this session. To make it permanent, update the HTML file and re-upload to GitHub.');
}

function connSh(){
  const url=document.getElementById('SH-URL').value.trim();
  const msg=document.getElementById('SH-MSG');
  if(!url||!url.includes('script.google.com')){msg.className='mer';msg.innerHTML='&#9940; Please enter a valid Google Apps Script URL.';return;}
  SHEET_URL=url;
  msg.className='mwarn';msg.innerHTML='&#9203; Connecting to Google Sheets...';
  loadFromSheets().then(ok=>{
    SHEETS_CONNECTED=ok;
    if(ok){msg.className='mok';msg.innerHTML='&#9989; Successfully connected! All data loaded from Google Sheets.';}
    else{msg.className='mer';msg.innerHTML='&#9940; Connection failed. Please check the URL and try again.';}
  });
}

function testSh(){
  const url=document.getElementById('SH-URL').value.trim();
  const msg=document.getElementById('SH-MSG');
  if(!url){msg.className='mer';msg.innerHTML='&#9940; Please enter a URL first.';return;}
  msg.className='mwarn';msg.innerHTML='&#9203; Testing connection...';
  sheetsRequest({action:'ping',url}).then(r=>{
    if(r&&(r.status==='ok'||r.pong)){msg.className='mok';msg.innerHTML='&#9989; Connection successful! Google Sheets is reachable.';}
    else{msg.className='mer';msg.innerHTML='&#9940; Connection test failed. Check your Apps Script URL.';}
  });
}

function sendOvEmail(){
  if(!SHEETS_CONNECTED||!SHEET_URL){alert('Please connect to Google Sheets first.');return;}
  const ovr=ISS.filter(i=>ov(i));
  if(!ovr.length){alert('No overdue books found at this time.');return;}
  showModal('&#128231; Send Overdue Emails','Send reminder emails to <b>'+ovr.length+'</b> members with overdue books?','Send All Emails','br',()=>{
    sheetsRequest({action:'sendOverdueEmails'}).then(r=>{
      alert(r&&r.status==='ok'?'&#9989; Overdue reminder emails sent successfully!':'&#9940; Email sending failed. Please check Google Sheets connection.');

  });
}

function calcDiscount(){
  const price=parseFloat(document.getElementById('BC-PRICE').value)||0;
  const disc=parseFloat(document.getElementById('BC-DISC').value)||0;
  const final=price-(price*disc/100);
  document.getElementById('BC-FINAL').value=disc>0?final.toFixed(2):'';
}

function addBookCatalogue(){
  const acc=(document.getElementById('BC-ACC').value||'').trim();
  const title=(document.getElementById('BC-TITLE').value||'').trim();
  const auth=(document.getElementById('BC-AUTH').value||'').trim();
  const pub=(document.getElementById('BC-PUB').value||'').trim();
  const edyr=(document.getElementById('BC-EDYR').value||'').trim();
  const price=(document.getElementById('BC-PRICE').value||'').trim();
  const disc=(document.getElementById('BC-DISC').value||'').trim();
  const finalP=(document.getElementById('BC-FINAL').value||'').trim();
  const subj=(document.getElementById('BC-SUBJ').value||'').trim();
  const pdate=(document.getElementById('BC-PDATE').value||'').trim();
  const catSel=document.getElementById('BC-CAT').value;
  const catCustom=(document.getElementById('BC-CAT-CUSTOM').value||'').trim();
  const category=catSel==='Others'?catCustom:catSel;
  const langSel=document.getElementById('BC-LANG').value;
  const langCustom=(document.getElementById('BC-LANG-CUSTOM').value||'').trim();
  const language=langSel==='Other'?langCustom:langSel;
  const msg=document.getElementById('BC-MSG');

  if(!acc||!title){msg.className='mer';msg.innerHTML='&#9940; Accession No and Book Title are required.';return;}
  if(!pdate){msg.className='mer';msg.innerHTML='&#9940; Purchase Date is required.';return;}
  if(!category){msg.className='mer';msg.innerHTML='&#9940; Please select or enter a Category.';return;}
  if(!language){msg.className='mer';msg.innerHTML='&#9940; Please select Language.';return;}
  if(BM[acc]){msg.className='mer';msg.innerHTML='&#9940; Accession No <b>'+acc+'</b> already exists in catalogue.';return;}

  const newBook={sr:BOOKS.length+1,acc,title,author:auth,pub,edyr,category,language,price,disc,finalP,subject:subj,pdate,av:true};
  BOOKS.push(newBook);BM[acc]=newBook;NEW_BOOKS.push(newBook);

  if(SHEETS_CONNECTED&&SHEET_URL){
    sheetsRequest({action:'addBook',accNo:acc,title,author:auth,publisher:pub,editionYear:edyr,category,language,price,discount:disc,priceAfterDiscount:finalP,subject:subj,purchaseDate:pdate}).then(r=>{
      if(r&&r.status==='ok'){msg.className='mok';msg.innerHTML='&#9989; Book "<b>'+title+'</b>" (Acc: '+acc+') added and saved to Google Sheets.';}
      else{msg.className='mwarn';msg.innerHTML='&#9888;&#65039; Book added locally. Sheets save may have failed &#8212; please verify.';}
    });
  }else{
    msg.className='mok';msg.innerHTML='&#9989; Book "<b>'+title+'</b>" (Acc: '+acc+') added to catalogue. Connect Google Sheets to save permanently.';
  }

  ['BC-ACC','BC-TITLE','BC-AUTH','BC-PUB','BC-EDYR','BC-PRICE','BC-DISC','BC-FINAL','BC-SUBJ','BC-PDATE'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('BC-CAT').value='';
  document.getElementById('BC-CAT-CUSTOM').style.display='none';
  document.getElementById('BC-LANG').value='';
  document.getElementById('BC-LANG-CUSTOM').style.display='none';

  const nbl=document.getElementById('NEW-BOOKS-LIST');
  if(nbl)nbl.innerHTML=NEW_BOOKS.length===0?'<p style="font-size:12px;color:#aaa">No books added yet.</p>':
    `<div class="tw"><table><thead><tr><th>Acc No</th><th>Title</th><th>Author</th><th>Category</th><th>Language</th><th>Purchase Date</th><th>Price</th><th>After Discount</th></tr></thead><tbody>
    ${NEW_BOOKS.map(b=>`<tr><td>${b.acc}</td><td>${b.title}</td><td>${b.author||'&#8212;'}</td><td>${b.category||'&#8212;'}</td><td>${b.language||'&#8212;'}</td><td>${fd(b.pdate)}</td><td>${b.price?'&#8377;'+b.price:'&#8212;'}</td><td>${b.finalP?'&#8377;'+b.finalP:'&#8212;'}</td></tr>`).join('')}
    </tbody></table></div>`;
}

function downloadBookCatalogue(){
  const hdr=['Sr No','Accession No','Book Title','Author','Publisher','Edition Year','Category','Language','Price','Discount %','Price After Discount','Subject/Notes','Purchase Date','Status'];
  const rows=BOOKS.map(b=>[b.sr,b.acc,'"'+b.title+'"','"'+(b.author||'')+'"','"'+(b.pub||'')+'"',b.edyr||'',b.category||'',b.language||'',b.price||'',b.disc||'',b.finalP||'','"'+(b.subject||'')+'"',b.pdate||fd(b.pdate)||'',b.av?'Available':'Issued']);
  const csv=[hdr,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='CIBM_Book_Catalogue_'+td().replace(/-/g,'')+'.csv';a.click();
}
